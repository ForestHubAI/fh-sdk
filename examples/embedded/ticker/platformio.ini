; ForestHub Ticker Example — Comprehensive test of all Ticker modes
; No WiFi/NTP required. Uses millis() for real-time tests and fake values for simulated tests.

[platformio]
default_envs = esp32dev

[env]
framework = arduino
build_unflags = -std=gnu++11
build_flags = -std=gnu++14
lib_deps =
    symlink://../../..
monitor_speed = 115200

[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=0
board_build.partitions = min_spiffs.csv

[env:portenta_h7_m7]
platform = ststm32
board = portenta_h7_m7
build_flags =
    ${env.build_flags}
    -Wl,--allow-multiple-definition
