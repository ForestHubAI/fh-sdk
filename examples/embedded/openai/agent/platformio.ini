; ==============================================================================
; OpenAI Embedded Agent Example
; ==============================================================================
; Usage: pio run -d examples/embedded/openai/agent -e esp32dev
;        pio run -d examples/embedded/openai/agent -e portenta_h7_m7
; ==============================================================================

[platformio]
default_envs = esp32dev

; ------------------------------------------------------------------------------
; Shared settings
; ------------------------------------------------------------------------------
[env]
framework = arduino
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_NETWORK
    -DFORESTHUB_ENABLE_CRYPTO
    -DFORESTHUB_ENABLE_GPIO
lib_deps =
    symlink://../../../..
monitor_speed = 115200

; ------------------------------------------------------------------------------
; ESP32
; ------------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
board_build.partitions = min_spiffs.csv
; Suppress harmless ESP32 core SSL logs (mbedTLS PEER_CLOSE_NOTIFY on connection teardown).
; Library uses its own logging via Console. Set to 1-5 for core debugging.
; Default Arduino loop stack is 8KB — too small for agent workflows
; (deep call chain: Runner → Client → HTTP → JSON serialization/parsing).
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_LOOP_STACK_SIZE=32768

; ------------------------------------------------------------------------------
; Arduino Portenta H7
; ------------------------------------------------------------------------------
[env:portenta_h7_m7]
platform = ststm32
board = portenta_h7_m7
build_flags =
    ${env.build_flags}
    -Wl,--allow-multiple-definition
