[platformio]
default_envs = esp32dev

[env]
framework = arduino
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++14
lib_deps =
    symlink://../../..
monitor_speed = 115200

; --- ESP32 ---

; Full: NETWORK + CRYPTO → tests both HTTP and HTTPS
[env:esp32dev]
platform = espressif32
board = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${env.build_flags}
    -DFORESTHUB_ENABLE_NETWORK
    -DFORESTHUB_ENABLE_CRYPTO
    -DCORE_DEBUG_LEVEL=0

; HTTP only: NETWORK without CRYPTO → tests plain HTTP, HTTPS must return nullptr
[env:esp32_http_only]
platform = espressif32
board = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${env.build_flags}
    -DFORESTHUB_ENABLE_NETWORK
    -DCORE_DEBUG_LEVEL=0

; --- Portenta H7 ---

; Full: NETWORK + CRYPTO → tests both HTTP and HTTPS
[env:portenta_h7_m7]
platform = ststm32
board = portenta_h7_m7
build_flags =
    ${env.build_flags}
    -DFORESTHUB_ENABLE_NETWORK
    -DFORESTHUB_ENABLE_CRYPTO
    -Wl,--allow-multiple-definition

; HTTP only: NETWORK without CRYPTO → tests plain HTTP, HTTPS must return nullptr
[env:portenta_http_only]
platform = ststm32
board = portenta_h7_m7
build_flags =
    ${env.build_flags}
    -DFORESTHUB_ENABLE_NETWORK
    -Wl,--allow-multiple-definition
