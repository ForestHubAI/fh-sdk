; ForestHub Console Test — Non-blocking TryReadLine with LED blink proof
; No WiFi required. Uses Console, Time, and GPIO subsystems.

[platformio]
default_envs = esp32dev

[env]
framework = arduino
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
lib_deps =
    symlink://../../../..
monitor_speed = 115200

[env:esp32dev]
platform = espressif32
board = esp32dev
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=0
board_build.partitions = min_spiffs.csv

[env:portenta_h7_m7]
platform = ststm32
board = portenta_h7_m7
build_flags =
    ${env.build_flags}
    -Wl,--allow-multiple-definition
