; ==============================================================================
; ForestHub Embedded Blink Example
; ==============================================================================
; Blinks the built-in LED using only the ForestHub HAL (GPIO, Console, Time).
; No direct Arduino API calls — demonstrates pure HAL usage.
;
; Usage: pio run -d examples/embedded/blink -e esp32dev
;        pio run -d examples/embedded/blink -e portenta_h7_m7
; ==============================================================================

[platformio]
default_envs = esp32dev

; ------------------------------------------------------------------------------
; Shared settings
; ------------------------------------------------------------------------------
[env]
framework = arduino
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
lib_deps =
    symlink://../../..
monitor_speed = 115200

; ------------------------------------------------------------------------------
; ESP32
; ------------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
board_build.partitions = min_spiffs.csv
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=0

; ------------------------------------------------------------------------------
; Arduino Portenta H7
; ------------------------------------------------------------------------------
[env:portenta_h7_m7]
platform = ststm32
board = portenta_h7_m7
build_flags =
    ${env.build_flags}
    -Wl,--allow-multiple-definition
