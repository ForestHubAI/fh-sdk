; ==============================================================================
; ForestHub PlatformIO Build Verification
; ==============================================================================
; PC builds:      cmake .. && make (from repo root, see CMakeLists.txt)
; Embedded builds: pio run -d pio/build_test -e <environment> (from repo root)
;                  or: cd pio/build_test && pio run -e <environment>
; ==============================================================================

[platformio]
default_envs = esp32dev

; ------------------------------------------------------------------------------
; Shared settings for all embedded environments
; ------------------------------------------------------------------------------
[env]
framework = arduino
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_NETWORK
    -DFORESTHUB_ENABLE_CRYPTO
    -DFORESTHUB_ENABLE_GPIO
lib_deps =
    symlink://../..
    arduino-libraries/ArduinoHttpClient@>=0.6.1
monitor_speed = 115200

; ------------------------------------------------------------------------------
; Shared ESP32 base settings
; ------------------------------------------------------------------------------
[esp32_base]
platform = espressif32
board = esp32dev
board_build.partitions = min_spiffs.csv

; ==============================================================================
; ALL 8 COMBINATIONS of NETWORK / CRYPTO / GPIO
; ==============================================================================

; --- 0/8: NONE (Console + Time only) ---
[env:esp32_none]
extends = esp32_base
build_flags =
    -std=gnu++14
    -DCORE_DEBUG_LEVEL=0

; --- 1/8: GPIO only ---
[env:esp32_gpio]
extends = esp32_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
    -DCORE_DEBUG_LEVEL=0

; --- 2/8: CRYPTO only ---
[env:esp32_crypto]
extends = esp32_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_CRYPTO
    -DCORE_DEBUG_LEVEL=0

; --- 3/8: NETWORK only (no CRYPTO — CreateHttpClient returns nullptr) ---
[env:esp32_network]
extends = esp32_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_NETWORK
    -DCORE_DEBUG_LEVEL=0

; --- 4/8: GPIO + CRYPTO ---
[env:esp32_gpio_crypto]
extends = esp32_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
    -DFORESTHUB_ENABLE_CRYPTO
    -DCORE_DEBUG_LEVEL=0

; --- 5/8: GPIO + NETWORK (no CRYPTO) ---
[env:esp32_gpio_network]
extends = esp32_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
    -DFORESTHUB_ENABLE_NETWORK
    -DCORE_DEBUG_LEVEL=0

; --- 6/8: NETWORK + CRYPTO (no GPIO) ---
[env:esp32_net_crypto]
extends = esp32_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_NETWORK
    -DFORESTHUB_ENABLE_CRYPTO
    -DCORE_DEBUG_LEVEL=0

; --- 7/8: ALL (Network + Crypto + GPIO) ---
[env:esp32dev]
extends = esp32_base
build_flags =
    ${env.build_flags}
    -DCORE_DEBUG_LEVEL=0

; ==============================================================================
; Legacy aliases
; ==============================================================================
[env:esp32dev_minimal]
extends = esp32_none

; ==============================================================================
; Shared Portenta H7 base settings
; ==============================================================================
[portenta_base]
platform = ststm32
board = portenta_h7_m7

; ==============================================================================
; ALL 8 COMBINATIONS — Portenta H7
; ==============================================================================

; --- 0/8: NONE (Console + Time only) ---
[env:portenta_none]
extends = portenta_base
build_flags =
    -std=gnu++14
    -Wl,--allow-multiple-definition

; --- 1/8: GPIO only ---
[env:portenta_gpio]
extends = portenta_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
    -Wl,--allow-multiple-definition

; --- 2/8: CRYPTO only ---
[env:portenta_crypto]
extends = portenta_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_CRYPTO
    -Wl,--allow-multiple-definition

; --- 3/8: NETWORK only (no CRYPTO) ---
[env:portenta_network]
extends = portenta_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_NETWORK
    -Wl,--allow-multiple-definition

; --- 4/8: GPIO + CRYPTO ---
[env:portenta_gpio_crypto]
extends = portenta_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
    -DFORESTHUB_ENABLE_CRYPTO
    -Wl,--allow-multiple-definition

; --- 5/8: GPIO + NETWORK (no CRYPTO) ---
[env:portenta_gpio_network]
extends = portenta_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_GPIO
    -DFORESTHUB_ENABLE_NETWORK
    -Wl,--allow-multiple-definition

; --- 6/8: NETWORK + CRYPTO (no GPIO) ---
[env:portenta_net_crypto]
extends = portenta_base
build_flags =
    -std=gnu++14
    -DFORESTHUB_ENABLE_NETWORK
    -DFORESTHUB_ENABLE_CRYPTO
    -Wl,--allow-multiple-definition

; --- 7/8: ALL (Network + Crypto + GPIO) ---
[env:portenta_h7_m7]
extends = portenta_base
build_flags =
    ${env.build_flags}
    -Wl,--allow-multiple-definition
