name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Doxygen
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen 1.14.0
        run: |
          wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_14_0/doxygen-1.14.0.linux.bin.tar.gz
          tar xzf doxygen-1.14.0.linux.bin.tar.gz
          echo "$PWD/doxygen-1.14.0/bin" >> "$GITHUB_PATH"

      - name: Verify Doxygen version
        run: doxygen --version

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
